    <script>
        const canvas = document.getElementById('mockupCanvas');
        const ctx = canvas.getContext('2d');

        const elModelo = document.getElementById('modelo');
        const elCorFrente = document.getElementById('cor-frente');
        const elCorLateral = document.getElementById('cor-lateral');
        const elBtnKraft = document.getElementById('btnKraft');
        const elInputLogo = document.getElementById('logo');
        const elFileText = document.getElementById('file-text');
        const elCordaoGrid = document.getElementById('cordaoGrid');
        
        const elLogoZoom = document.getElementById('logo-zoom');
        const elLogoGiro = document.getElementById('logo-giro');
        const elForm = document.getElementById('mockupForm');
        const btnGenerateJPEG = document.getElementById('btnGenerateJPEG');
        const btnDownloadLayout = document.getElementById('btnDownloadLayout');

        let imgBase = new Image();       
        let imgFrente = new Image();     
        let imgLateral = new Image();    
        let imgCordao = new Image();     
        let imgLogo = new Image();
        let imgEmpresa = new Image(); 
        
        let modoKraftAtivo = false;
        let logoCarregada = false;
        let logoEmpresaPronta = false;
        let mockupGeradoComRodape = false;
        let corCordaoSelecionada = "#ffffff"; 

        let logoX = 0; 
        let logoY = 0; 
        let arrastandoLogo = false;
        let offsetMouseX = 0;
        let offsetMouseY = 0;
        
        let logoAtualWidth = 0;
        let logoAtualHeight = 0;

        const mostruarioCordao = [
            { nome: "Branco", hex: "#ffffff" }, { nome: "Preto", hex: "#000000" },
            { nome: "Cinza Claro", hex: "#8c8c8c" }, { nome: "Azul Caneta", hex: "#0b2bc6" },
            { nome: "Azul Claro", hex: "#7ec8e3" }, { nome: "Verde Escuro", hex: "#006129" },
            { nome: "Verde Pistache", hex: "#74b74b" }, { nome: "Vermelho", hex: "#e5121c" },
            { nome: "Rosa BB", hex: "#ffa3cc" }, { nome: "Pink", hex: "#cb1661" },
            { nome: "Laranja", hex: "#ff5100" }, { nome: "Amarelo Ouro", hex: "#ffc800" },
            { nome: "Amarelo Limão", hex: "#fff700" }, { nome: "Roxo", hex: "#520188" },
            { nome: "Violeta Claro", hex: "#8700ff" }, { nome: "Vinho Escuro", hex: "#510224" },
            { nome: "Marrom Café", hex: "#86725e" }, { nome: "Bege Kraft", hex: "#cba277" }
        ];

        imgEmpresa.crossOrigin = "anonymous";
        imgEmpresa.onload = function() { logoEmpresaPronta = true; };
        imgEmpresa.src = 'logo-empresa.png';
        function renderizarGradeCordoes() {
            elCordaoGrid.innerHTML = "";
            mostruarioCordao.forEach(cor => {
                const box = document.createElement('div');
                box.className = "cordao-box";
                box.style.backgroundColor = cor.hex;
                box.title = cor.nome;
                if (cor.hex === corCordaoSelecionada) box.classList.add('active');
                box.addEventListener('click', function() {
                    document.querySelectorAll('.cordao-box').forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                    corCordaoSelecionada = cor.hex;
                    mockupGeradoComRodape = false;
                    btnDownloadLayout.disabled = true;
                    processarETingirMockup(false);
                });
                elCordaoGrid.appendChild(box);
            });
        }

        function criarCamadaColorida(imgMascara, corHex) {
            const buffer = document.createElement('canvas');
            buffer.width = canvas.width;
            buffer.height = canvas.height;
            const bCtx = buffer.getContext('2d');
            if (imgMascara.complete && imgMascara.naturalWidth !== 0) {
                bCtx.drawImage(imgMascara, 0, 0);
                bCtx.globalCompositeOperation = 'source-in';
                bCtx.fillStyle = corHex;
                bCtx.fillRect(0, 0, canvas.width, canvas.height);
            }
            return buffer;
        }

        function resetarPosicaoLogoPadrao() {
            if (!imgBase.naturalWidth) return;
            if (elModelo.value === 'horizontal') {
                logoX = imgBase.naturalWidth * 0.48;
                logoY = imgBase.naturalHeight * 0.54;
            } else {
                logoX = imgBase.naturalWidth * 0.50;
                logoY = imgBase.naturalHeight * 0.53;
            }
        }

        function carregarArquivosDoServidor() {
            const sentido = elModelo.value;
            let carregadas = 0;

            function verificarPronto() {
                carregadas++;
                if (carregadas === 4) {
                    resetarPosicaoLogoPadrao();
                    mockupGeradoComRodape = false;
                    btnDownloadLayout.disabled = true;
                    processarETingirMockup(false);
                }
            }

            imgBase.crossOrigin = "anonymous";
            imgFrente.crossOrigin = "anonymous";
            imgLateral.crossOrigin = "anonymous";
            imgCordao.crossOrigin = "anonymous";

            imgBase.onload = verificarPronto;
            imgFrente.onload = verificarPronto;
            imgLateral.onload = verificarPronto;
            imgCordao.onload = verificarPronto;

            imgBase.src = `sacola_${sentido}_base.png?v=${Date.now()}`;
            imgFrente.src = `sacola_${sentido}_frente.png?v=${Date.now()}`;
            imgLateral.src = `sacola_${sentido}_lateral.png?v=${Date.now()}`;
            imgCordao.src = `sacola_${sentido}_cordao.png?v=${Date.now()}`;
        }
        function desenharLogoPerspectiva(ctx, img, x, y, largura, altura, escalaDireita) {
            // Divide a logo em 100 fatias verticais para criar a transição suave de escala
            const fatias = 100;
            const largFatia = largura / fatias;

            for (let i = 0; i < fatias; i++) {
                const progresso = i / fatias;
                
                // Calcula a redução gradual da altura conforme caminha para o lado direito
                const fatorAltura = 1 - (progresso * (1 - escalaDireita));
                const altFatia = altura * fatorAltura;
                
                // Distribui as seções baseando-se no ponto centralizado da logo
                const secaoX = x - largura / 2 + (i * largFatia);
                const secaoY = y - altFatia / 2;

                // Captura um pedaço da imagem original e renderiza no tamanho distorcido
                ctx.drawImage(
                    img,
                    (i * (img.naturalWidth / fatias)), 0, (img.naturalWidth / fatias), img.naturalHeight,
                    secaoX, secaoY, largFatia + 0.5, altFatia
                );
            }
        }
        function processarETingirMockup(incluirRodape = false) {
            if (!imgBase.complete || imgBase.naturalWidth === 0) return;

            canvas.width = imgBase.naturalWidth;
            canvas.height = incluirRodape ? imgBase.naturalHeight + 110 : imgBase.naturalHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#e8e8e8";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.shadowColor = "rgba(0, 0, 0, 0.38)"; 
            ctx.shadowBlur = imgBase.naturalWidth * 0.04;    
            ctx.shadowOffsetX = imgBase.naturalWidth * 0.015; 
            ctx.shadowOffsetY = imgBase.naturalHeight * 0.025; 
            ctx.drawImage(imgBase, 0, 0);
            ctx.restore();

            if (imgFrente.complete && imgFrente.naturalWidth > 0) {
                const corFinalFrente = modoKraftAtivo ? "#c2a67a" : elCorFrente.value;
                const camadaFrente = criarCamadaColorida(imgFrente, corFinalFrente);
                ctx.drawImage(camadaFrente, 0, 0);
            }

            if (imgLateral.complete && imgLateral.naturalWidth > 0) {
                const corFinalLateral = modoKraftAtivo ? "#c2a67a" : elCorLateral.value;
                const camadaLateral = criarCamadaColorida(imgLateral, corFinalLateral);
                ctx.drawImage(camadaLateral, 0, 0);
            }

            // --- APLICAÇÃO DE POWERCLIP E ENVELOPE DE PERSPECTIVA ---
            if (logoCarregada && imgLogo.complete && imgLogo.naturalWidth > 0) {
                ctx.save();
                
                // MÁSCARA (POWERCLIP): Limita o desenho estritamente dentro da frente da sacola
                if (imgFrente.complete && imgFrente.naturalWidth > 0) {
                    ctx.drawImage(imgFrente, 0, 0);
                    ctx.globalCompositeOperation = 'source-in';
                }
                
                let percentualZoom = elLogoZoom.value / 100;
                logoAtualWidth = imgBase.naturalWidth * percentualZoom;
                let proporcao = (imgLogo.naturalHeight / imgLogo.naturalWidth);
                logoAtualHeight = proporcao * logoAtualWidth;
                
                ctx.translate(logoX, logoY);
                let giroManualRad = (parseFloat(elLogoGiro.value) * Math.PI) / 180;
                ctx.rotate(giroManualRad);

                // Aplica a inclinação de Skew original
                if (elModelo.value === 'horizontal') {
                    ctx.transform(1, 0, -0.200, 1, 0, 0); 
                } else {
                    ctx.transform(1, 0, -0.080, 1, 0, 0); 
                }
                
                // PERSPECTIVA (LATERAL DIREITA MENOR): Reduz a escala da direita dinamicamente
                const escalaDireita = elModelo.value === 'horizontal' ? 0.82 : 0.90;
                desenharLogoPerspectiva(ctx, imgLogo, 0, 0, logoAtualWidth, logoAtualHeight, escalaDireita);
                
                ctx.restore();
            }

            if (imgCordao.complete && imgCordao.naturalWidth > 0) {
                const camadaCordao = criarCamadaColorida(imgCordao, corCordaoSelecionada);
                ctx.drawImage(camadaCordao, 0, 0);
            }

            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            ctx.drawImage(imgBase, 0, 0);
            ctx.restore();

            if (incluirRodape) {
                ctx.save();
                ctx.fillStyle = "#e8e8e8";
                ctx.fillRect(0, imgBase.naturalHeight, canvas.width, 110);

                ctx.strokeStyle = "rgba(0, 0, 0, 0.05)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(30, imgBase.naturalHeight);
                ctx.lineTo(canvas.width - 30, imgBase.naturalHeight);
                ctx.stroke();

                let altDesejada = 34; 
                let offsetTextoX = 40;

                if (logoEmpresaPronta && imgEmpresa.naturalWidth > 0) {
                    let largCalculada = (imgEmpresa.naturalWidth / imgEmpresa.naturalHeight) * altDesejada;
                    ctx.drawImage(imgEmpresa, 40, imgBase.naturalHeight + 28, largCalculada, altDesejada);
                    offsetTextoX = 55 + largCalculada;
                }

                ctx.textAlign = "left";
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 13.5px sans-serif";
                ctx.fillText("COMVIL BRINDES", offsetTextoX, imgBase.naturalHeight + 38);
                
                ctx.font = "10.5px sans-serif";
                ctx.fillStyle = "#475569";
                ctx.fillText("CNPJ: 36.206.286/0001-03  |  ✉ comvil@comvil.com.br", offsetTextoX, imgBase.naturalHeight + 54);
                ctx.fillText("☎ Fixo: 11 3461-0813  |  📱 WhatsApp: 11 97024-3064", offsetTextoX, imgBase.naturalHeight + 70);
                ctx.restore();
            }
        }
        elInputLogo.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                elFileText.textContent = e.target.files[0].name;
                const leitorBase64 = new FileReader();
                leitorBase64.onload = function(evt) {
                    logoCarregada = false;
                    imgLogo = new Image();
                    imgLogo.onload = function() {
                        logoCarregada = true;
                        resetarPosicaoLogoPadrao();
                        mockupGeradoComRodape = false;
                        btnDownloadLayout.disabled = true;
                        processarETingirMockup(false); 
                    };
                    imgLogo.src = evt.target.result;
                };
                leitorBase64.readAsDataURL(e.target.files[0]);
            }
        });

        function obterCoordenadasPointer(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            return { x, y };
        }

        canvas.addEventListener('pointerdown', function(e) {
            if (!logoCarregada) return;
            canvas.setPointerCapture(e.pointerId); 
            
            const mouse = obterCoordenadasPointer(e);
            if (mouse.x >= logoX - logoAtualWidth/2 && mouse.x <= logoX + logoAtualWidth/2 &&
                mouse.y >= logoY - logoAtualHeight/2 && mouse.y <= logoY + logoAtualHeight/2) {
                
                arrastandoLogo = true;
                offsetMouseX = mouse.x - logoX;
                offsetMouseY = mouse.y - logoY;
                canvas.style.cursor = "grabbing";
                mockupGeradoComRodape = false;
                btnDownloadLayout.disabled = true;
            }
        });

        canvas.addEventListener('pointermove', function(e) {
            if (!logoCarregada) return;
            const mouse = obterCoordenadasPointer(e);
            
            if (arrastandoLogo) {
                logoX = mouse.x - offsetMouseX;
                logoY = mouse.y - offsetMouseY;
                processarETingirMockup(false); 
            } else {
                if (mouse.x >= logoX - logoAtualWidth/2 && mouse.x <= logoX + logoAtualWidth/2 &&
                    mouse.y >= logoY - logoAtualHeight/2 && mouse.y <= logoY + logoAtualHeight/2) {
                    canvas.style.cursor = "pointer";
                } else {
                    canvas.style.cursor = "default";
                }
            }
        });

        canvas.addEventListener('pointerup', function(e) {
            if (arrastandoLogo) {
                canvas.releasePointerCapture(e.pointerId);
                arrastandoLogo = false;
                canvas.style.cursor = "default";
            }
        });

        btnGenerateJPEG.addEventListener('click', function() {
            processarETingirMockup(true); 
            mockupGeradoComRodape = true;
            btnDownloadLayout.disabled = false; 
        });

        elBtnKraft.addEventListener('click', function() {
            modoKraftAtivo = !modoKraftAtivo;
            if (modoKraftAtivo) this.classList.add('active');
            else this.classList.remove('active');
            mockupGeradoComRodape = false;
            btnDownloadLayout.disabled = true;
            processarETingirMockup(false);
        });

        elCorFrente.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        elCorLateral.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        
        elLogoZoom.addEventListener('input', () => { mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        elLogoGiro.addEventListener('input', () => { mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        elModelo.addEventListener('change', carregarArquivosDoServidor);

        elForm.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!mockupGeradoComRodape) return;
            const link = document.createElement('a');
            const sentido = elModelo.value;
            link.download = `proposta-comvil-${sentido}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 1.0);
            link.click();
        });

        window.addEventListener('DOMContentLoaded', () => {
            renderizarGradeCordoes();
            carregarArquivosDoServidor();
        });
    </script>
</body>
</html>
