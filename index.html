<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador de Lâminas Comerciais - Comvil Brindes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f3f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1150px;
            gap: 30px;
            align-items: center;
        }

        /* Painel Lateral de Controle */
        .form-container {
            background-color: #ffffff;
            padding: 30px 25px;
            border-radius: 12px;
            width: 42%;
            min-width: 350px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            max-height: 95vh;
            overflow-y: auto;
        }

        h2 {
            color: #003366;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eaeaea;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #555555;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            background-color: #ffffff;
            color: #333333;
            font-size: 14px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23333333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }
        .papel-triplo-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
        }

        .picker-container {
            display: flex;
            flex-direction: column;
            width: 33.33%;
        }

        .picker-label {
            font-size: 9px;
            font-weight: 700;
            color: #777777;
            text-transform: uppercase;
            margin-bottom: 4px;
            text-align: center;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid #cccccc;
            width: 100%;
            height: 42px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }

        .btn-kraft {
            width: 33.33%;
            height: 42px;
            background-color: #c2a67a;
            color: #ffffff;
            border: none;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            align-self: flex-end;
        }

        .btn-kraft:hover { background-color: #b09468; }
        .btn-kraft.active { border: 2px solid #003366; background-color: #9e8257; }

        /* Grid de Cordão Otimizado em Exatamente 2 Linhas de 9 Colunas */
        .cordao-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 6px;
            background-color: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .cordao-box {
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #cbd5e1;
            transition: all 0.1s ease-in-out;
        }

        .cordao-box:hover { transform: scale(1.1); border-color: #64748b; }
        .cordao-box.active { border-color: #003366; box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.15); }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 4px;
            outline: none;
            accent-color: #003366;
            cursor: pointer;
        }

        .file-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 6px;
            background-color: #ffffff;
            overflow: hidden;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-file {
            background-color: #efefef;
            border: 1px solid #dddddd;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
        }

        .file-text {
            font-size: 13px;
            color: #666666;
            margin-left: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Interface da Barra de Progresso Real do Efeito */
        .progress-wrapper {
            display: none;
            margin-top: 10px;
            background-color: #f1f5f9;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #e2e8f0;
        }

        .progress-container {
            width: 100%;
            background-color: #cbd5e1;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #28a745;
        }

        .progress-title {
            font-size: 11px;
            font-weight: 600;
            color: #334155;
            display: flex;
            justify-content: space-between;
        }

        .btn-action {
            width: 100%;
            border: none;
            padding: 13px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-generate { background-color: #28a745; color: #ffffff; }
        .btn-generate:hover { background-color: #218838; }

        .btn-download { background-color: #003366; color: #ffffff; }
        .btn-download:hover { background-color: #002244; }
        .btn-download:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        /* Visualizador Estúdio */
        .preview-container {
            flex-grow: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 450px;
        }

        .preview-box {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e8e8e8; 
            border-radius: 16px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(226, 232, 240, 0.8);
            touch-action: none;
        }

        canvas {
            max-width: 100%;
            height: auto !important;
            object-fit: contain;
            display: block;
            border-radius: 8px;
        }

        .hint-text {
            font-size: 11px;
            color: #888888;
            margin-top: 15px;
            font-weight: 500;
            text-align: center;
        }

        @media (max-width: 820px) {
            .container { flex-direction: column; gap: 20px; }
            .form-container { width: 100%; max-height: none; }
            .preview-container { width: 100%; min-height: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h2>Mockup de Sacola</h2>
            
            <form id="mockupForm">
                <div class="form-group">
                    <label for="modelo">Variação *</label>
                    <select id="modelo">
                        <option value="vertical">Vertical</option>
                        <option value="horizontal">Horizontal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Configuração da Cor de Papel *</label>
                    <div class="papel-triplo-wrapper">
                        <div class="picker-container">
                            <span class="picker-label">Frente</span>
                            <input type="color" id="cor-frente" value="#ffffff">
                        </div>
                        <div class="picker-container">
                            <span class="picker-label">Lateral</span>
                            <input type="color" id="cor-lateral" value="#ffffff">
                        </div>
                        <button type="button" id="btnKraft" class="btn-kraft">Kraft</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Cordão *</label>
                    <div class="cordao-grid" id="cordaoGrid"></div>
                </div>

                <div class="form-group">
                    <label>Logotipo do Cliente (PNG Transparente) *</label>
                    <div class="file-input-wrapper">
                        <button type="button" class="btn-file">Escolher ficheiro</button>
                        <span id="file-text" class="file-text">Nenhum ficheiro selecionado</span>
                        <input type="file" id="logo" accept="image/png">
                    </div>
                    
                    <div class="progress-wrapper" id="progressWrapper">
                        <div class="progress-title">
                            <span>Processando efeito (20%)...</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="logo-zoom">Tamanho do Logotipo (Zoom)</label>
                    <input type="range" id="logo-zoom" min="10" max="70" value="35">
                </div>

                <div class="form-group">
                    <label for="logo-giro">Giro do Logotipo (Rotação)</label>
                    <input type="range" id="logo-giro" min="-15" max="15" value="0" step="0.5">
                </div>

                <button type="button" id="btnGenerateJPEG" class="btn-action btn-generate">⚙️ Gerar Mockup (JPEG)</button>
                <button type="submit" id="btnDownloadLayout" class="btn-action btn-download" disabled>💾 Descarregar Layout</button>
            </form>
        </div>

        <div class="preview-container">
            <div class="preview-box">
                <canvas id="mockupCanvas"></canvas>
            </div>
            <span class="hint-text">💡 Arraste na tela para mover / Use as barras laterais para zoom e giro</span>
        </div>
    </div>
    <!-- LOGICA JAVASCRIPT -->
    <script>
        const canvas = document.getElementById('mockupCanvas');
        const ctx = canvas.getContext('2d');

        const elModelo = document.getElementById('modelo');
        const elCorFrente = document.getElementById('cor-frente');
        const elCorLateral = document.getElementById('cor-lateral');
        const elBtnKraft = document.getElementById('btnKraft');
        const elInputLogo = document.getElementById('logo');
        const elFileText = document.getElementById('file-text');
        const elCordaoGrid = document.getElementById('cordaoGrid');
        
        const elLogoZoom = document.getElementById('logo-zoom');
        const elLogoGiro = document.getElementById('logo-giro');
        const elForm = document.getElementById('mockupForm');
        const btnGenerateJPEG = document.getElementById('btnGenerateJPEG');
        const btnDownloadLayout = document.getElementById('btnDownloadLayout');
        
        // Elementos da Barra de Progresso
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');

        let imgBase = new Image();       
        let imgFrente = new Image();     
        let imgLateral = new Image();    
        let imgCordao = new Image();     
        let imgLogoOriginal = new Image();
        let canvasLogoProcessada = document.createElement('canvas'); // Canvas oculto para salvar a logo com efeito permanente
        let imgEmpresa = new Image(); 
        
        let modoKraftAtivo = false;
        let logoCarregada = false;
        let logoEmpresaPronta = false;
        let mockupGeradoComRodape = false;
        let corCordaoSelecionada = "#ffffff"; 

        let logoX = 0; 
        let logoY = 0; 
        let arrastandoLogo = false;
        let offsetMouseX = 0;
        let offsetMouseY = 0;
        
        let logoAtualWidth = 0;
        let logoAtualHeight = 0;

        const mostruarioCordao = [
            { nome: "Branco", hex: "#ffffff" }, { nome: "Preto", hex: "#000000" },
            { nome: "Cinza Claro", hex: "#8c8c8c" }, { nome: "Azul Caneta", hex: "#0b2bc6" },
            { nome: "Azul Claro", hex: "#7ec8e3" }, { nome: "Verde Escuro", hex: "#006129" },
            { nome: "Verde Pistache", hex: "#74b74b" }, { nome: "Vermelho", hex: "#e5121c" },
            { nome: "Rosa BB", hex: "#ffa3cc" }, { nome: "Pink", hex: "#cb1661" },
            { nome: "Laranja", hex: "#ff5100" }, { nome: "Amarelo Ouro", hex: "#ffc800" },
            { nome: "Amarelo Limão", hex: "#fff700" }, { nome: "Roxo", hex: "#520188" },
            { nome: "Violeta Claro", hex: "#8700ff" }, { nome: "Vinho Escuro", hex: "#510224" },
            { nome: "Marrom Café", hex: "#86725e" }, { nome: "Bege Kraft", hex: "#cba277" }
        ];

        imgEmpresa.crossOrigin = "anonymous";
        imgEmpresa.onload = function() { logoEmpresaPronta = true; };
        imgEmpresa.src = 'logo-empresa.png';

        function renderizarGradeCordoes() {
            elCordaoGrid.innerHTML = "";
            mostruarioCordao.forEach(cor => {
                const box = document.createElement('div');
                box.className = "cordao-box";
                box.style.backgroundColor = cor.hex;
                box.title = cor.nome;
                if (cor.hex === corCordaoSelecionada) box.classList.add('active');
                box.addEventListener('click', function() {
                    document.querySelectorAll('.cordao-box').forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                    corCordaoSelecionada = cor.hex;
                    mockupGeradoComRodape = false;
                    btnDownloadLayout.disabled = true;
                    processarETingirMockup(false);
                });
                elCordaoGrid.appendChild(box);
            });
        }

        // MOTOR AVANÇADO PIXEL A PIXEL: CONSTROE O EFEITO DE 20% SEM QUEBRAS ASSÍNCRONAS
        function processarEfeitoCónicoBrahma() {
            if (!imgLogoOriginal.naturalWidth) return;

            progressWrapper.style.display = "block";
            progressBar.style.width = "0%";
            progressPercent.textContent = "0%";

            const w = imgLogoOriginal.naturalWidth;
            const h = imgLogoOriginal.naturalHeight;

            canvasLogoProcessada.width = w;
            canvasLogoProcessada.height = h;
            const pCtx = canvasLogoProcessada.getContext('2d');
            
            pCtx.clearRect(0, 0, w, h);
            pCtx.drawImage(imgLogoOriginal, 0, 0);

            try {
                const srcData = pCtx.getImageData(0, 0, w, h);
                const dstData = pCtx.createImageData(w, h);
                
                let y = 0;
                
                function processarFilaPorLinhas() {
                    if (y >= h) {
                        // Conclusão total do lote
                        pCtx.putImageData(dstData, 0, 0);
                        progressBar.style.width = "100%";
                        progressPercent.textContent = "100%";
                        
                        setTimeout(() => {
                            progressWrapper.style.style.display = "none";
                            logoCarregada = true;
                            resetarPosicaoLogoPadrao();
                            processarETingirMockup(false); // Renderiza estavelmente na sacola
                        }, 250);
                        return;
                    }

                    // Processa blocos de 15 linhas para manter a animação da barra visível fluidamente
                    for (let step = 0; step < 15 && y < h; step++, y++) {
                        // Calcula a escala vertical de afunilamento que diminui de forma linear 20% da esquerda para a direita
                        let progressoHorizontal = y / h;
                        let afunilamentoEscala = 1.0 - (0.20 * progressoHorizontal); // 20% fixo solicitado

                        for (let x = 0; x < w; x++) {
                            let srcX = x;
                            let centerOffsetY = y - (h / 2);
                            let srcY = Math.round((h / 2) + (centerOffsetY / afunilamentoEscala));

                            if (srcY >= 0 && srcY < h && srcX >= 0 && srcX < w) {
                                let dstIdx = (y * w + x) * 4;
                                let srcIdx = (srcY * w + srcX) * 4;

                                dstData.data[dstIdx] = srcData.data[srcIdx];
                                dstData.data[dstIdx + 1] = srcData.data[srcIdx + 1];
                                dstData.data[dstIdx + 2] = srcData.data[srcIdx + 2];
                                dstData.data[dstIdx + 3] = srcData.data[srcIdx + 3];
                            }
                        }
                    }

                    let percentualCalculado = Math.round((y / h) * 100);
                    progressBar.style.width = percentualCalculado + "%";
                    progressPercent.textContent = percentualCalculado + "%";

                    requestAnimationFrame(processarFilaPorLinhas);
                }

                requestAnimationFrame(processarFilaPorLinhas);

            } catch (err) {
                // Fallback de segurança estável caso haja bloqueios CORS locais
                console.error("Erro no processamento de pixels, aplicando cópia limpa direta.", err);
                progressWrapper.style.display = "none";
                logoCarregada = true;
                resetarPosicaoLogoPadrao();
                processarETingirMockup(false);
            }
        }

        function criarCamadaColorida(imgMascara, corHex) {
            const buffer = document.createElement('canvas');
            buffer.width = canvas.width;
            buffer.height = canvas.height;
            const bCtx = buffer.getContext('2d');
            if (imgMascara.complete && imgMascara.naturalWidth !== 0) {
                bCtx.drawImage(imgMascara, 0, 0);
                bCtx.globalCompositeOperation = 'source-in';
                bCtx.fillStyle = corHex;
                bCtx.fillRect(0, 0, canvas.width, canvas.height);
            }
            return buffer;
        }

        function processarETingirMockup(incluirRodape = false) {
            if (!imgBase.complete || imgBase.naturalWidth === 0) return;

            canvas.width = imgBase.naturalWidth;
            canvas.height = incluirRodape ? imgBase.naturalHeight + 110 : imgBase.naturalHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#e8e8e8";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.shadowColor = "rgba(0, 0, 0, 0.38)"; 
            ctx.shadowBlur = imgBase.naturalWidth * 0.04;    
            ctx.shadowOffsetX = imgBase.naturalWidth * 0.015; 
            ctx.shadowOffsetY = imgBase.naturalHeight * 0.025; 
            ctx.drawImage(imgBase, 0, 0);
            ctx.restore();

            // 1. Frente
            if (imgFrente.complete && imgFrente.naturalWidth > 0) {
                const corFinalFrente = modoKraftAtivo ? "#c2a67a" : elCorFrente.value;
                const camadaFrente = criarCamadaColorida(imgFrente, corFinalFrente);
                ctx.drawImage(camadaFrente, 0, 0);
            }

            // 2. Lateral
            if (imgLateral.complete && imgLateral.naturalWidth > 0) {
                const corFinalLateral = modoKraftAtivo ? "#c2a67a" : elCorLateral.value;
                const camadaLateral = criarCamadaColorida(imgLateral, corFinalLateral);
                ctx.drawImage(camadaLateral, 0, 0);
            }

            // 3. LOGOTIPO PROCESSADO (Efeito de 20% gravado de forma estática permanente)
        function resetarPosicaoLogoPadrao() {
            if (!imgBase.naturalWidth) return;
            if (elModelo.value === 'horizontal') {
                logoX = imgBase.naturalWidth * 0.48;
                logoY = imgBase.naturalHeight * 0.54;
            } else {
                logoX = imgBase.naturalWidth * 0.50;
                logoY = imgBase.naturalHeight * 0.53;
            }
        }

        function carregarArquivosDoServidor() {
            const sentido = elModelo.value;
            let carregadas = 0;

            function verificarPronto() {
                carregadas++;
                if (carregadas === 4) {
                    resetarPosicaoLogoPadrao();
                    mockupGeradoComRodape = false;
                    btnDownloadLayout.disabled = true;
                    processarETingirMockup(false);
                }
            }

            imgBase.crossOrigin = "anonymous";
            imgFrente.crossOrigin = "anonymous";
            imgLateral.crossOrigin = "anonymous";
            imgCordao.crossOrigin = "anonymous";

            imgBase.onload = verificarPronto;
            imgFrente.onload = verificarPronto;
            imgLateral.onload = verificarPronto;
            imgCordao.onload = verificarPronto;

            imgBase.src = `sacola_${sentido}_base.png?v=${Date.now()}`;
            imgFrente.src = `sacola_${sentido}_frente.png?v=${Date.now()}`;
            imgLateral.src = `sacola_${sentido}_lateral.png?v=${Date.now()}`;
            imgCordao.src = `sacola_${sentido}_cordao.png?v=${Date.now()}`;
        }

        // SISTEMA DE UPLOAD ATOMICAMENTE SEGURO COM DISPARO DA FILA DO EFEITO DE PERSPECTIVA
        elInputLogo.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const arquivo = e.target.files[0];
                elFileText.textContent = arquivo.name;

                const leitorBase64 = new FileReader();
                leitorBase64.onload = function(evt) {
                    const dadosStringBase64 = evt.target.result;
                    
                    logoProntaComEfeito = false;
                    const imgCarregamentoNativo = new Image();
                    
                    imgCarregamentoNativo.onload = function() {
                        // Quando o arquivo original é lido com sucesso, dispara o motor de afunilamento assíncrono
                        aplicarEfeitoAfunilamentoAssincrono(imgCarregamentoNativo);
                    };
                    imgCarregamentoNativo.src = dadosStringBase64;
                };
                leitorBase64.readAsDataURL(arquivo);
            }
        });

        // DETECTOR DE COORDENADAS ADAPTATIVO POINTER-EVENTS (SEM DIFERENÇA ENTRE COMPUTADOR E CELULAR)
        function obterCoordenadasPointer(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            return { x, y };
        }

        canvas.addEventListener('pointerdown', function(e) {
            if (!logoProntaComEfeito) return;
            canvas.setPointerCapture(e.pointerId); // Isola o toque no celular travando o scroll lateral do navegador
            
            const mouse = obterCoordenadasPointer(e);
            if (mouse.x >= logoX - logoAtualWidth/2 && mouse.x <= logoX + logoAtualWidth/2 &&
                mouse.y >= logoY - logoAtualHeight/2 && mouse.y <= logoY + logoAtualHeight/2) {
                
                arrastandoLogo = true;
                offsetMouseX = mouse.x - logoX;
                offsetMouseY = mouse.y - logoY;
                canvas.style.cursor = "grabbing";
                mockupGeradoComRodape = false;
                btnDownloadLayout.disabled = true;
            }
        });

        canvas.addEventListener('pointermove', function(e) {
            if (!logoProntaComEfeito) return;
            const mouse = obterCoordenadasPointer(e);
            
            if (arrastandoLogo) {
                logoX = mouse.x - offsetMouseX;
                logoY = mouse.y - offsetMouseY;
                processarETingirMockup(false); // Renderiza o arraste em tempo de execução
            } else {
                if (mouse.x >= logoX - logoAtualWidth/2 && mouse.x <= logoX + logoAtualWidth/2 &&
                    mouse.y >= logoY - logoAtualHeight/2 && mouse.y <= logoY + logoAtualHeight/2) {
                    canvas.style.cursor = "pointer";
                } else {
                    canvas.style.cursor = "default";
                }
            }
        });

        canvas.addEventListener('pointerup', function(e) {
            if (arrastandoLogo) {
                canvas.releasePointerCapture(e.pointerId);
                arrastandoLogo = false;
                canvas.style.cursor = "default";
            }
        });

        btnGenerateJPEG.addEventListener('click', function() {
            processarETingirMockup(true); 
            mockupGeradoComRodape = true;
            btnDownloadLayout.disabled = false; 
        });

        elBtnKraft.addEventListener('click', function() {
            modoKraftAtivo = !modoKraftAtivo;
            if (modoKraftAtivo) this.classList.add('active');
            else this.classList.remove('active');
            mockupGeradoComRodape = false;
            btnDownloadLayout.disabled = true;
            processarETingirMockup(false);
        });

        elCorFrente.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        elCorLateral.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        
        elLogoZoom.addEventListener('input', () => { mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        elLogoGiro.addEventListener('input', () => { mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); });
        elModelo.addEventListener('change', carregarArquivosDoServidor);

        elForm.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!mockupGeradoComRodape) return;
            const link = document.createElement('a');
            const sentido = elModelo.value;
            link.download = `proposta-comvil-${sentido}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 1.0);
            link.click();
        });

        window.addEventListener('DOMContentLoaded', () => {
            renderizarGradeCordoes();
            carregarArquivosDoServidor();
        });
    </script>
</body>
</html>
