<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comvil - Gerador de Mockups Autônomo 3D</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #0056b3;
            --bg-light: #f1f5f9;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: var(--bg-light); padding: 30px; display: flex; justify-content: center; align-items: start; gap: 30px; }
        
        .painel-controle { background: white; width: 360px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .painel-preview { background: white; flex: 1; max-width: 650px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 550px; }
        
        h1 { font-size: 20px; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
        
        .field { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 11px; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; background: #fff; height: 38px; }
        
        .btn-gerar { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: background 0.2s; }
        .btn-gerar:hover { background: #002244; }
        
        .btn-baixar { background: #25D366; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; text-decoration: none; margin-top: 20px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-baixar:hover { background: #128C7E; }
        
        canvas { border: 1px solid var(--border); border-radius: 8px; max-width: 100%; background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .aviso-cor { font-size: 11px; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="painel-controle">
    <h1>Mockup Inteligente 3D</h1>
    
    <div class="field">
        <label>Modelo da Sacola *</label>
        <select id="modeloSacola" onchange="limparPreview()">
            <option value="de-pe">Sacola De Pé (Vertical)</option>
            <option value="deitada">Sacola Deitada (Horizontal)</option>
        </select>
    </div>

    <div class="field">
        <label>Logotipo do Cliente (PNG Transparente) *</label>
        <input type="file" id="logoCliente" accept="image/png" style="padding-top: 7px;">
    </div>

    <div id="boxAvisoCor" class="aviso-cor">Cor da Sacola Definida pela Logo</div>

    <div class="field">
        <label>Cor do Cordão / Alça *</label>
        <select id="corCordao">
            <option value="#ffffff">Branco</option>
            <option value="#000000">Preto</option>
            <option value="#d2b48c">Kraft / Pardo</option>
            <option value="#003366">Azul Marinho</option>
            <option value="#cc0000">Vermelho</option>
        </select>
    </div>

    <div class="field">
        <label>Quantidade de Cores Gravadas *</label>
        <select id="numCores">
            <option value="1">1 Cor</option>
            <option value="2">2 Cores</option>
            <option value="3">3 Cores</option>
            <option value="4">4 Cores</option>
            <option value="cromia">Cromia / Papel</option>
        </select>
    </div>

    <button class="btn-gerar" onclick="gerarMockup3D()">Gerar Mockup Realista</button>
</div>

<div class="painel-preview">
    <canvas id="canvasMockup" width="600" height="600"></canvas>
    <a id="btnBaixarImage" href="#" download="Mockup_Realista_Comvil.png" class="btn-baixar">Baixar Imagem do Mockup</a>
</div>
<script>
let imgLogo = null;
let corIdentificadaAutomatica = "#00bcd4"; // Cor de segurança inicial

// Captura e gerencia o upload do logotipo em PNG transparente
document.getElementById('logoCliente').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            imgLogo = new Image();
            imgLogo.onload = function() {
                extrairCorPredominante();
                limparPreview();
            };
            imgLogo.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
});

function extrairCorPredominante() {
    const canvasTemp = document.createElement('canvas');
    const ctxTemp = canvasTemp.getContext('2d');
    
    // Reduz o tamanho da amostra para focar no corpo principal da imagem
    canvasTemp.width = 150;
    canvasTemp.height = 150;
    
    ctxTemp.drawImage(imgLogo, 0, 0, canvasTemp.width, canvasTemp.height);
    const imgData = ctxTemp.getImageData(0, 0, canvasTemp.width, canvasTemp.height).data;
    
    let contagemCores = {};
    let maiorContagem = 0;
    let corMaisFrequente = "#00bcd4";

    for (let i = 0; i < imgData.length; i += 4) {
        let r = imgData[i];
        let g = imgData[i+1];
        let b = imgData[i+2];
        let a = imgData[i+3];

        // Ignora pixels com transparência alta, brancos ou muito escuros (bordas e sombras)
        if (a < 220) continue;
        if (r > 240 && g > 240 && b > 240) continue;
        if (r < 20 && g < 20 && b < 20) continue;

        let rgbChave = `${r},${g},${b}`;
        contagemCores[rgbChave] = (contagemCores[rgbChave] || 0) + 1;

        if (contagemCores[rgbChave] > maiorContagem) {
            maiorContagem = contagemCores[rgbChave];
            corMaisFrequente = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }
    }

    corIdentificadaAutomatica = corMaisFrequente;
    
    // Atualiza a caixinha de aviso com a cor processada
    const box = document.getElementById('boxAvisoCor');
    box.style.backgroundColor = corIdentificadaAutomatica;
    
    let r = parseInt(corIdentificadaAutomatica.slice(1,3), 16);
    let g = parseInt(corIdentificadaAutomatica.slice(3,5), 16);
    let b = parseInt(corIdentificadaAutomatica.slice(5,7), 16);
    let brilho = (r * 299 + g * 587 + b * 114) / 1000;
    box.style.color = brilho > 128 ? '#000000' : '#ffffff';
    box.style.display = 'block';
}

function limparPreview() {
    const canvas = document.getElementById('canvasMockup');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('btnBaixarImage').style.display = 'none';
}
<script>
function desenharSombraEAmbiente(ctx) {
    // Fundo limpo de estúdio fotográfico com degradê infinito suave
    let gradEstudio = ctx.createRadialGradient(300, 300, 50, 300, 300, 400);
    gradEstudio.addColorStop(0, "#ffffff");
    gradEstudio.addColorStop(1, "#e2e8f0");
    ctx.fillStyle = gradEstudio;
    ctx.fillRect(0, 0, 600, 600);

    // Sombra projetada de contato no chão realista (3D drop shadow)
    ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
    ctx.beginPath();
    ctx.ellipse(300, 470, 200, 20, 0, 0, Math.PI * 2);
    ctx.fill();
}

function desenharSacolaDePe(ctx, corSacola, corCordao) {
    // 1. Corpo Frontal da Sacola (Baseado na foto real "Maxivin")
    ctx.fillStyle = corSacola;
    ctx.beginPath();
    ctx.moveTo(160, 150); // Superior Esquerdo
    ctx.lineTo(410, 150); // Superior Direito
    ctx.lineTo(380, 460); // Inferior Direito
    ctx.lineTo(160, 460); // Inferior Esquerdo
    ctx.closePath();
    ctx.fill();

    // Sombra suave para marcar a dobra da base inferior
    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
    ctx.fillRect(160, 410, 220, 50);

    // 2. Fole Lateral Contrastante (Fole Branco da foto "Maxivin")
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(410, 150);
    ctx.lineTo(465, 170);
    ctx.lineTo(425, 450);
    ctx.lineTo(380, 460);
    ctx.closePath();
    ctx.fill();

    // Sombra linear para destacar a dobra em V do fole lateral vertical
    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
    ctx.beginPath();
    ctx.moveTo(410, 150);
    ctx.lineTo(438, 160);
    ctx.lineTo(403, 455);
    ctx.lineTo(380, 460);
    ctx.closePath();
    ctx.fill();

    // Volume tridimensional da face frontal (Degradê multiply)
    let gradFrente = ctx.createLinearGradient(160, 150, 410, 150);
    gradFrente.addColorStop(0, "rgba(0,0,0,0.1)");
    gradFrente.addColorStop(0.3, "rgba(255,255,255,0.06)");
    gradFrente.addColorStop(0.8, "rgba(255,255,255,0)");
    gradFrente.addColorStop(1, "rgba(0,0,0,0.18)");
    ctx.fillStyle = gradFrente;
    ctx.fillRect(160, 150, 250, 310);

    // 3. Furos dos Ilhós (Superiores)
    ctx.fillStyle = "#cbd5e1";
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(230, 180, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(230, 180, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#cbd5e1";
    ctx.beginPath(); ctx.arc(340, 180, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(340, 180, 5, 0, Math.PI * 2); ctx.fill();

    // 4. Desenho do Cordão / Alça Dinâmica
    ctx.strokeStyle = corCordao;
    ctx.lineWidth = 10;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.bezierCurveTo(230, 180, 285, 90, 340, 180);
    ctx.stroke();

    // Nó/trava do cordão dentro do ilhós
    ctx.fillStyle = corCordao;
    ctx.beginPath(); ctx.arc(230, 180, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(340, 180, 3, 0, Math.PI * 2); ctx.fill();
    
    return { x: 170, y: 200, largura: 200, altura: 200 };
}

function desenharSacolaDeitada(ctx, corSacola, corCordao) {
    // 1. Corpo Frontal da Sacola (Baseado na foto real "Sarah Flor")
    ctx.fillStyle = corSacola;
    ctx.beginPath();
    ctx.moveTo(130, 190);
    ctx.lineTo(440, 190);
    ctx.lineTo(420, 450);
    ctx.lineTo(165, 450);
    ctx.closePath();
    ctx.fill();

    // 2. Fole Lateral (Na mesma cor da sacola, seguindo o padrão horizontal)
    ctx.fillStyle = corSacola;
    ctx.beginPath();
    ctx.moveTo(440, 190);
    ctx.lineTo(480, 180);
    ctx.lineTo(455, 425);
    ctx.lineTo(420, 450);
    ctx.closePath();
    ctx.fill();

    // Sombra linear para destacar a dobra em V do fole deitado
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.beginPath();
    ctx.moveTo(440, 190);
    ctx.lineTo(460, 185);
    ctx.lineTo(438, 438);
    ctx.lineTo(420, 450);
    ctx.closePath();
    ctx.fill();

    // Luz tridimensional da face frontal deitada
    let gradFrente = ctx.createLinearGradient(130, 190, 440, 190);
    gradFrente.addColorStop(0, "rgba(0,0,0,0.08)");
    gradFrente.addColorStop(0.3, "rgba(255,255,255,0.06)");
    gradFrente.addColorStop(0.8, "rgba(255,255,255,0)");
    gradFrente.addColorStop(1, "rgba(0,0,0,0.2)");
    ctx.fillStyle = gradFrente;
    ctx.beginPath(); ctx.moveTo(130,190); ctx.lineTo(440,190); ctx.lineTo(420,450); ctx.lineTo(165,450); ctx.fill();

    // 3. Furos dos Ilhós da Sacola Horizontal
    ctx.fillStyle = "#cbd5e1";
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(220, 215, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(220, 215, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#cbd5e1";
    ctx.beginPath(); ctx.arc(350, 215, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(350, 215, 5, 0, Math.PI * 2); ctx.fill();

    // 4. Cordão / Alça em Arco
    ctx.strokeStyle = corCordao;
    ctx.lineWidth = 8;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.bezierCurveTo(220, 215, 285, 140, 350, 215);
    ctx.stroke();

    return { x: 170, y: 240, largura: 230, altura: 180 };
}

function gerarMockup3D() {
    const canvas = document.getElementById('canvasMockup');
    const ctx = canvas.getContext('2d');
    
    const modelo = document.getElementById('modeloSacola').value;
    const corCordao = document.getElementById('corCordao').value;
    const numCores = document.getElementById('numCores').value;

    // Inicializa o ambiente de estúdio infinito e sombras no chão
    desenharSombraEAmbiente(ctx);

    let areaUtil;

    // Renderiza a estrutura da sacola de forma 100% autônoma por código
    if (modelo === 'de-pe') {
        areaUtil = desenharSacolaDePe(ctx, corIdentificadaAutomatica, corCordao);
    } else {
        areaUtil = desenharSacolaDeitada(ctx, corIdentificadaAutomatica, corCordao);
    }

    // Processamento, redimensionamento proporcional e centralização da estampa
    if (imgLogo) {
        let larguraAlvo = areaUtil.largura * 0.75;
        let alturaAlvo = larguraAlvo * (imgLogo.height / imgLogo.width);

        if (alturaAlvo > areaUtil.altura * 0.65) {
            alturaAlvo = areaUtil.altura * 0.65;
            larguraAlvo = alturaAlvo * (imgLogo.width / imgLogo.height);
        }

        let posX = areaUtil.x + (areaUtil.largura - larguraAlvo) / 2;
        let posY = areaUtil.y + (areaUtil.altura - alturaAlvo) / 2;

        ctx.save();
        ctx.globalAlpha = 0.96; // Leve transparência para simular a tinta sobre o papel
        ctx.drawImage(imgLogo, posX, posY, larguraAlvo, alturaAlvo);
        ctx.restore();
    }

    // Informação técnica de cores gravadas
    ctx.fillStyle = "#475569";
    ctx.font = "bold 11px Arial";
    ctx.textAlign = "right";
    let textoEspecificacao = numCores === 'cromia' ? "GRAVAÇÃO: CROMIA ( PAPEL )" : `GRAVAÇÃO: ${numCores} COR(ES) SEGUINDO O PADRÃO DA LOGO`;
    ctx.fillText(textoEspecificacao, 580, 580);

    // Habilita e configura o botão de download
    const btnBaixar = document.getElementById('btnBaixarImage');
    btnBaixar.href = canvas.toDataURL("image/png");
    btnBaixar.style.display = 'inline-block';
}
</script>
</body>
</html>
