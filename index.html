<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Mockup - Estúdio Fotográfico Realista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f3f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 30px;
            align-items: center;
        }

        /* Painel Lateral de Controle */
        .form-container {
            background-color: #ffffff;
            padding: 30px 25px;
            border-radius: 12px;
            width: 42%;
            min-width: 350px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            max-height: 95vh;
            overflow-y: auto;
        }

        h2 {
            color: #003366;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eaeaea;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #555555;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            background-color: #ffffff;
            color: #333333;
            font-size: 14px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23333333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }
        .papel-triplo-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
        }

        .picker-container {
            display: flex;
            flex-direction: column;
            width: 33.33%;
        }

        .picker-label {
            font-size: 9px;
            font-weight: 700;
            color: #777777;
            text-transform: uppercase;
            margin-bottom: 4px;
            text-align: center;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid #cccccc;
            width: 100%;
            height: 42px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }

        .btn-kraft {
            width: 33.33%;
            height: 42px;
            background-color: #c2a67a;
            color: #ffffff;
            border: none;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            align-self: flex-end;
        }

        .btn-kraft:hover { background-color: #b09468; }
        .btn-kraft.active { border: 2px solid #003366; background-color: #9e8257; }

        /* Grid de Cordão */
        .cordao-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background-color: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .cordao-box {
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #cbd5e1;
            transition: all 0.1s ease-in-out;
        }

        .cordao-box:hover { transform: scale(1.1); border-color: #64748b; }
        .cordao-box.active { border-color: #003366; box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.15); }

        /* Sliders */
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 4px;
            outline: none;
            accent-color: #003366;
            cursor: pointer;
        }

        /* Botão de Upload */
        .file-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 6px;
            background-color: #ffffff;
            overflow: hidden;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-file {
            background-color: #efefef;
            border: 1px solid #dddddd;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
        }

        .file-text {
            font-size: 13px;
            color: #666666;
            margin-left: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-download {
            width: 100%;
            background-color: #003366;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover { background-color: #002244; }

        /* Visualizador Direito */
        .preview-container {
            flex-grow: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 450px;
        }

        .preview-box {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e8e8e8; /* Cor cinza claro estática no contêiner da página */
            border-radius: 16px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        canvas {
            max-width: 100%;
            height: auto !important;
            object-fit: contain;
            display: block;
            border-radius: 8px;
        }

        .hint-text {
            font-size: 11px;
            color: #888888;
            margin-top: 15px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .form-container { width: 100%; max-height: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h2>Variações de Sacola</h2>
            
            <form id="mockupForm">
                <div class="form-group">
                    <label for="modelo">Variação *</label>
                    <select id="modelo">
                        <option value="vertical">Vertical</option>
                        <option value="horizontal">Horizontal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Configuração da Cor de Papel *</label>
                    <div class="papel-triplo-wrapper">
                        <div class="picker-container">
                            <span class="picker-label">Frente</span>
                            <input type="color" id="cor-frente" value="#ffffff">
                        </div>
                        <div class="picker-container">
                            <span class="picker-label">Lateral</span>
                            <input type="color" id="cor-lateral" value="#ffffff">
                        </div>
                        <button type="button" id="btnKraft" class="btn-kraft">Kraft</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Cor de Cordão (Mostruário P.P.) *</label>
                    <div class="cordao-grid" id="cordaoGrid"></div>
                </div>

                <div class="form-group">
                    <label>Logotipo do Cliente (PNG Transparente) *</label>
                    <div class="file-input-wrapper">
                        <button type="button" class="btn-file">Escolher ficheiro</button>
                        <span id="file-text" class="file-text">Nenhum ficheiro selecionado</span>
                        <input type="file" id="logo" accept="image/png">
                    </div>
                </div>

                <div class="form-group">
                    <label for="logo-zoom">Tamanho do Logotipo (Zoom)</label>
                    <input type="range" id="logo-zoom" min="10" max="70" value="35">
                </div>

                <div class="form-group">
                    <label for="logo-giro">Giro do Logotipo (Rotação)</label>
                    <input type="range" id="logo-giro" min="-15" max="15" value="0" step="0.5">
                </div>

                <button type="submit" class="btn-download">💾 Descarregar Layout</button>
            </form>
        </div>

        <div class="preview-container">
            <div class="preview-box">
                <canvas id="mockupCanvas"></canvas>
            </div>
            <span class="hint-text">💡 Arraste com o mouse para mover / Use as barras para zoom e giro</span>
        </div>
    </div>
    <!-- LOGICA JAVASCRIPT -->
    <script>
        const canvas = document.getElementById('mockupCanvas');
        const ctx = canvas.getContext('2d');

        const elModelo = document.getElementById('modelo');
        const elCorFrente = document.getElementById('cor-frente');
        const elCorLateral = document.getElementById('cor-lateral');
        const elBtnKraft = document.getElementById('btnKraft');
        const elInputLogo = document.getElementById('logo');
        const elFileText = document.getElementById('file-text');
        const elCordaoGrid = document.getElementById('cordaoGrid');
        
        const elLogoZoom = document.getElementById('logo-zoom');
        const elLogoGiro = document.getElementById('logo-giro');
        const elForm = document.getElementById('mockupForm');

        let imgBase = new Image();       
        let imgFrente = new Image();     
        let imgLateral = new Image();    
        let imgCordao = new Image();     
        let imgLogo = new Image();
        
        let modoKraftAtivo = false;
        let logoCarregada = false;
        let corCordaoSelecionada = "#ffffff"; 

        let logoX = 0; 
        let logoY = 0; 
        let arrastandoLogo = false;
        let offsetMouseX = 0;
        let offsetMouseY = 0;
        
        let logoAtualWidth = 0;
        let logoAtualHeight = 0;

        const mostruarioCordao = [
            { nome: "Branco", hex: "#ffffff" }, { nome: "Preto", hex: "#1a1a1a" },
            { nome: "Cinza Prata", hex: "#8a8a8a" }, { nome: "Azul Anil", hex: "#001fb3" },
            { nome: "Azul Royal", hex: "#0047ab" }, { nome: "Azul BB", hex: "#7ec8e3" },
            { nome: "Verde Musgo", hex: "#2e3b2e" }, { nome: "Verde Cabaré", hex: "#007a5e" },
            { nome: "Verde Bandeira", hex: "#005c29" }, { nome: "Verde Pistache", hex: "#6bb343" },
            { nome: "Verde Limão", hex: "#99cc33" }, { nome: "Verde BB", hex: "#8ee5c4" },
            { nome: "Roxo", hex: "#4b0082" }, { nome: "Violeta", hex: "#7f00ff" },
            { nome: "Pink", hex: "#d11d5b" }, { nome: "Rosa BB", hex: "#fca1c1" },
            { nome: "Laranja", hex: "#ff4500" }, { nome: "Amarelo BB", hex: "#fae96c" },
            { nome: "Vinho", hex: "#5c0632" }, { nome: "Bege", hex: "#cfa076" },
            { nome: "Rami", hex: "#8c7661" }
        ];

        function renderizarGradeCordoes() {
            elCordaoGrid.innerHTML = "";
            mostruarioCordao.forEach(cor => {
                const box = document.createElement('div');
                box.className = "cordao-box";
                box.style.backgroundColor = cor.hex;
                box.title = cor.nome;

                if (cor.hex === corCordaoSelecionada) box.classList.add('active');

                box.addEventListener('click', function() {
                    document.querySelectorAll('.cordao-box').forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                    corCordaoSelecionada = cor.hex;
                    processarETingirMockup();
                });

                elCordaoGrid.appendChild(box);
            });
        }

        function criarCamadaColorida(imgMascara, corHex) {
            const buffer = document.createElement('canvas');
            buffer.width = canvas.width;
            buffer.height = canvas.height;
            const bCtx = buffer.getContext('2d');

            if (imgMascara.complete && imgMascara.naturalWidth !== 0) {
                bCtx.drawImage(imgMascara, 0, 0);
                bCtx.globalCompositeOperation = 'source-in';
                bCtx.fillStyle = corHex;
                bCtx.fillRect(0, 0, canvas.width, canvas.height);
            }
            return buffer;
        }

        // MOTOR DE RENDERIZAÇÃO ATUALIZADO: FUNDO CINZA CLARO AUTOMÁTICO + SOMBRA REALISTA NA SACOLA
        function processarETingirMockup() {
            if (!imgBase.complete || imgBase.naturalWidth === 0) return;

            canvas.width = imgBase.naturalWidth;
            canvas.height = imgBase.naturalHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // MELHORIA 1: Pinta o fundo da imagem automaticamente com o cinza claro desejado (Mantém fixo ao descarregar)
            ctx.fillStyle = "#e8e8e8";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // MELHORIA 2: Injeta a sombra projetada de profundidade na sacola física (Aplica o desfoque estúdio por baixo)
            ctx.save();
            ctx.shadowColor = "rgba(0, 0, 0, 0.16)"; // Sombra suave e realista
            ctx.shadowBlur = canvas.width * 0.04;    // Desfoque proporcional ao tamanho da imagem
            ctx.shadowOffsetX = canvas.width * 0.015; // Deslocamento lateral
            ctx.shadowOffsetY = canvas.height * 0.025; // Deslocamento para baixo
            
            // Desenha uma silhueta de sombra baseada no formato da imagem antes das cores
            ctx.drawImage(imgBase, 0, 0);
            ctx.restore();

            // 1. Frente (sacola_X_frente.png)
            if (imgFrente.complete && imgFrente.naturalWidth > 0) {
                const corFinalFrente = modoKraftAtivo ? "#c2a67a" : elCorFrente.value;
                const camadaFrente = criarCamadaColorida(imgFrente, corFinalFrente);
                ctx.drawImage(camadaFrente, 0, 0);
            }

            // 2. Lateral (sacola_X_lateral.png)
            if (imgLateral.complete && imgLateral.naturalWidth > 0) {
                const corFinalLateral = modoKraftAtivo ? "#c2a67a" : elCorLateral.value;
                const camadaLateral = criarCamadaColorida(imgLateral, corFinalLateral);
                ctx.drawImage(camadaLateral, 0, 0);
            }

            // 3. Logotipo (Perspectiva profunda à direita)
            if (logoCarregada && imgLogo.complete && imgLogo.naturalWidth > 0) {
                ctx.save();
                ctx.translate(logoX, logoY);
                
                let percentualZoom = elLogoZoom.value / 100;
                logoAtualWidth = canvas.width * percentualZoom;
                let proporcao = (imgLogo.naturalHeight / imgLogo.naturalWidth);
                logoAtualHeight = proporcao * logoAtualWidth;
                
                let giroManualRad = (parseFloat(elLogoGiro.value) * Math.PI) / 180;
                
                if (elModelo.value === 'horizontal') {
                    ctx.rotate((-1.8 * Math.PI / 180) + giroManualRad);
                    ctx.transform(1, 0.058, 0, 1, 0, 0); 
                } else {
                    ctx.rotate((-0.8 * Math.PI / 180) + giroManualRad);
                    ctx.transform(1, 0.024, 0, 1, 0, 0); 
                }
                
                ctx.drawImage(imgLogo, -logoAtualWidth / 2, -logoAtualHeight / 2, logoAtualWidth, logoAtualHeight);
                ctx.restore();
            }

            // 4. Cordões (sacola_X_cordao.png)
            if (imgCordao.complete && imgCordao.naturalWidth > 0) {
                const camadaCordao = criarCamadaColorida(imgCordao, corCordaoSelecionada);
                ctx.drawImage(camadaCordao, 0, 0);
            }

            // 5. Sombras de Relevo por Cima de tudo (sacola_X_base.png)
            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            ctx.drawImage(imgBase, 0, 0);
            ctx.restore();
        }
        function resetarPosicaoLogoPadrao() {
            if (!imgBase.naturalWidth) return;
            if (elModelo.value === 'horizontal') {
                logoX = imgBase.naturalWidth * 0.48;
                logoY = imgBase.naturalHeight * 0.54;
            } else {
                logoX = imgBase.naturalWidth * 0.50;
                logoY = imgBase.naturalHeight * 0.53;
            }
        }

        function carregarArquivosDoServidor() {
            const sentido = elModelo.value;
            let carregadas = 0;

            function verificarPronto() {
                carregadas++;
                if (carregadas === 4) {
                    resetarPosicaoLogoPadrao();
                    processarETingirMockup();
                }
            }

            imgBase.crossOrigin = "anonymous";
            imgFrente.crossOrigin = "anonymous";
            imgLateral.crossOrigin = "anonymous";
            imgCordao.crossOrigin = "anonymous";

            imgBase.onload = verificarPronto;
            imgFrente.onload = verificarPronto;
            imgLateral.onload = verificarPronto;
            imgCordao.onload = verificarPronto;

            imgBase.src = `sacola_${sentido}_base.png?v=${Date.now()}`;
            imgFrente.src = `sacola_${sentido}_frente.png?v=${Date.now()}`;
            imgLateral.src = `sacola_${sentido}_lateral.png?v=${Date.now()}`;
            imgCordao.src = `sacola_${sentido}_cordao.png?v=${Date.now()}`;
        }

        elInputLogo.addEventListener('change', function(e) {
            if (e.target.files && e.target.files) {
                elFileText.textContent = e.target.files[0].name;
                const blobURL = URL.createObjectURL(e.target.files[0]);
                
                logoCarregada = false;
                imgLogo = new Image(); 
                
                imgLogo.onload = function() {
                    logoCarregada = true;
                    resetarPosicaoLogoPadrao();
                    processarETingirMockup();
                };
                imgLogo.src = blobURL;
            }
        });

        function obterCoordenadasMouse(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            return { x, y };
        }

        canvas.addEventListener('mousedown', function(e) {
            if (!logoCarregada) return;
            const mouse = obterCoordenadasMouse(e);
            if (mouse.x >= logoX - logoAtualWidth/2 && mouse.x <= logoX + logoAtualWidth/2 &&
                mouse.y >= logoY - logoAtualHeight/2 && mouse.y <= logoY + logoAtualHeight/2) {
                arrastandoLogo = true;
                offsetMouseX = mouse.x - logoX;
                offsetMouseY = mouse.y - logoY;
                canvas.style.cursor = "grabbing";
            }
        });

        canvas.addEventListener('mousemove', function(e) {
            if (!logoCarregada) return;
            const mouse = obterCoordenadasMouse(e);
            if (arrastandoLogo) {
                logoX = mouse.x - offsetMouseX;
                logoY = mouse.y - offsetMouseY;
                processarETingirMockup(); 
            } else {
                if (mouse.x >= logoX - logoAtualWidth/2 && mouse.x <= logoX + logoAtualWidth/2 &&
                    mouse.y >= logoY - logoAtualHeight/2 && mouse.y <= logoY + logoAtualHeight/2) {
                    canvas.style.cursor = "pointer";
                } else {
                    canvas.style.cursor = "default";
                }
            }
        });

        window.addEventListener('mouseup', function() {
            if (arrastandoLogo) {
                arrastandoLogo = false;
                canvas.style.cursor = "default";
            }
        });

        elBtnKraft.addEventListener('click', function() {
            modoKraftAtivo = !modoKraftAtivo;
            if (modoKraftAtivo) this.classList.add('active');
            else this.classList.remove('active');
            processarETingirMockup();
        });

        elCorFrente.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); processarETingirMockup(); });
        elCorLateral.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); processarETingirMockup(); });
        
        elLogoZoom.addEventListener('input', processarETingirMockup);
        elLogoGiro.addEventListener('input', processarETingirMockup);
        elModelo.addEventListener('change', carregarArquivosDoServidor);

        elForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const link = document.createElement('a');
            const sentido = elModelo.value;
            link.download = `mockup-layout-${sentido}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });

        window.addEventListener('DOMContentLoaded', () => {
            renderizarGradeCordoes();
            carregarArquivosDoServidor();
        });
    </script>
</body>
</html>
