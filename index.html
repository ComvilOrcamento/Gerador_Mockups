<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comvil - Gerador de Mockups Pro Inteligente 3D</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #0056b3;
            --bg-light: #f1f5f9;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: var(--bg-light); padding: 30px; display: flex; justify-content: center; align-items: start; gap: 30px; }
        
        .painel-controle { background: white; width: 360px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .painel-preview { background: white; flex: 1; max-width: 650px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 550px; }
        
        h1 { font-size: 20px; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
        
        .field { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 11px; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; background: #fff; height: 38px; }
        
        .btn-gerar { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: background 0.2s; }
        .btn-gerar:hover { background: #002244; }
        
        .btn-baixar { background: #25D366; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; text-decoration: none; margin-top: 20px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-baixar:hover { background: #128C7E; }
        
        canvas { border: 1px solid var(--border); border-radius: 8px; max-width: 100%; background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .aviso-cor { font-size: 11px; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; text-align: center; font-weight: bold; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="painel-controle">
    <h1>Mockup Inteligente 3D</h1>
    
    <div class="field">
        <label>Modelo da Sacola *</label>
        <select id="modeloSacola" onchange="limparPreview()">
            <option value="de-pe">Sacola De Pé (Vertical)</option>
            <option value="deitada">Sacola Deitada (Horizontal)</option>
        </select>
    </div>

    <div class="field">
        <label>Logotipo do Cliente (PNG Transparente) *</label>
        <input type="file" id="logoCliente" accept="image/png" style="padding-top: 7px;">
    </div>

    <div id="boxAvisoCor" class="aviso-cor">Cor Processada Automaticamente</div>

    <div class="field">
        <label>Quantidade de Cores Gravadas *</label>
        <select id="numCores">
            <option value="1">1 Cor</option>
            <option value="2">2 Cores</option>
            <option value="3">3 Cores</option>
            <option value="4">4 Cores</option>
            <option value="cromia">Cromia / Papel</option>
        </select>
    </div>

    <button class="btn-gerar" onclick="processarEMockup()">Gerar Mockup 3D Realista</button>
</div>

<div class="painel-preview">
    <canvas id="canvasMockup" width="600" height="600"></canvas>
    <a id="btnBaixarImage" href="#" download="Mockup_Realista_Comvil.png" class="btn-baixar">Baixar Imagem do Mockup</a>
</div>
<script>
let imgLogo = null;
let corIdentificadaAutomatica = "#00bcd4";

// Banco de dados com os arquivos que você já possui soltos na mesma pasta do servidor
const bancoModelosSacola = {
    "de-pe": {
        "shadow": "sacola_pe_sombras.png",
        "areaUtil": { x: 140, y: 160, largura: 200, altura: 200 }
    },
    "deitada": {
        "shadow": "sacola_deitada_sombras.png",
        "areaUtil": { x: 135, y: 195, largura: 235, altura: 185 }
    }
};

// Captura e gerencia o upload da logomarca do cliente
document.getElementById('logoCliente').addEventListener('change', function(e) {
    const file = e.target.files;
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            imgLogo = new Image();
            imgLogo.onload = function() {
                extrairCorPredominante();
                limparPreview();
            };
            imgLogo.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
});

function extrairCorPredominante() {
    const canvasTemp = document.createElement('canvas');
    const ctxTemp = canvasTemp.getContext('2d');
    canvasTemp.width = imgLogo.width > 200 ? 200 : imgLogo.width;
    canvasTemp.height = imgLogo.height > 200 ? 200 : imgLogo.height;
    
    ctxTemp.drawImage(imgLogo, 0, 0, canvasTemp.width, canvasTemp.height);
    const imgData = ctxTemp.getImageData(0, 0, canvasTemp.width, canvasTemp.height).data;
    
    let contagemCores = {};
    let maiorContagem = 0;
    let corMaisFrequente = "#00bcd4";

    for (let i = 0; i < imgData.length; i += 16) {
        let r = imgData[i];
        let g = imgData[i+1];
        let b = imgData[i+2];
        let a = imgData[i+3];

        if (a < 200) continue;
        if (r > 240 && g > 240 && b > 240) continue;
        if (r < 15 && g < 15 && b < 15) continue;

        let rgbChave = `${r},${g},${b}`;
        contagemCores[rgbChave] = (contagemCores[rgbChave] || 0) + 1;

        if (contagemCores[rgbChave] > maiorContagem) {
            maiorContagem = contagemCores[rgbChave];
            corMaisFrequente = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }
    }

    corIdentificadaAutomatica = corMaisFrequente;
    const box = document.getElementById('boxAvisoCor');
    box.style.backgroundColor = corIdentificadaAutomatica;
    
    let r = parseInt(corIdentificadaAutomatica.slice(1,3), 16);
    let g = parseInt(corIdentificadaAutomatica.slice(3,5), 16);
    let b = parseInt(corIdentificadaAutomatica.slice(5,7), 16);
    let brilho = (r * 299 + g * 587 + b * 114) / 1000;
    box.style.color = brilho > 128 ? '#000000' : '#ffffff';
    box.style.display = 'block';
}

function limparPreview() {
    const canvas = document.getElementById('canvasMockup');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('btnBaixarImage').style.display = 'none';
}

function carregarImagemAsync(src) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Falha ao carregar: " + src));
        img.src = src;
    });
}
async function processarEMockup() {
    const canvas = document.getElementById('canvasMockup');
    const ctx = canvas.getContext('2d');
    const modeloSelecionado = document.getElementById('modeloSacola').value;
    const numCores = document.getElementById('numCores').value;
    const configModelo = bancoModelosSacola[modeloSelecionado];

    // 1. Cria o fundo limpo de estúdio fotográfico com degradê infinito suave
    let gradEstudio = ctx.createRadialGradient(300, 300, 50, 300, 300, 400);
    gradEstudio.addColorStop(0, "#ffffff");
    gradEstudio.addColorStop(1, "#e2e8f0");
    ctx.fillStyle = gradEstudio;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    try {
        // Carrega a imagem da sacola branca enviada
        const imgOriginal = await carregarImagemAsync(configModelo.shadow);

        // Cria uma tela de processamento oculta do mesmo tamanho da sacola
        const canvasProc = document.createElement('canvas');
        canvasProc.width = canvas.width;
        canvasProc.height = canvas.height;
        const ctxProc = canvasProc.getContext('2d');

        // Desenha a sacola branca original no canvas de processamento
        ctxProc.drawImage(imgOriginal, 0, 0, canvas.width, canvas.height);

        // Captura os dados brutos de pixels (RGBA) da sacola branca
        const imgDataBuffer = ctxProc.getImageData(0, 0, canvasProc.width, canvasProc.height);
        const pixels = imgDataBuffer.data;

        // Converte a cor identificada de Hexadecimal para RGB numérico
        const rAlvo = parseInt(corIdentificadaAutomatica.slice(1, 3), 16);
        const gAlvo = parseInt(corIdentificadaAutomatica.slice(3, 5), 16);
        const bAlvo = parseInt(corIdentificadaAutomatica.slice(5, 7), 16);

        // Algoritmo de Varredura por Luminância Autônoma
        for (let i = 0; i < pixels.length; i += 4) {
            let r = pixels[i];
            let g = pixels[i + 1];
            let b = pixels[i + 2];
            let a = pixels[i + 3];

            // Ignora pixels transparentes da imagem
            if (a < 10) continue;

            // Identifica se o pixel faz parte da sacola branca analisando o brilho
            // Tons claros de cinza/branco são mapeados como o corpo da sacola
            if (r > 30 && g > 30 && b > 30 && !(r === g && g === b && r < 40)) {
                // Calcula a intensidade das dobras e sombras originais (0 a 1)
                let intensidadeSombraR = r / 255;
                let intensidadeSombraG = g / 255;
                let intensidadeSombraB = b / 255;

                // Aplica a nova cor multiplicando pelos vincos reais da foto branca
                pixels[i] = rAlvo * intensidadeSombraR;
                pixels[i + 1] = gAlvo * intensidadeSombraG;
                pixels[i + 2] = bAlvo * intensidadeSombraB;
            }
        }

        // Devolve os pixels modificados e realistas para a tela oculta
        ctxProc.putImageData(imgDataBuffer, 0, 0);

        // Desenha a sacola colorida com sombras reais por cima do fundo de estúdio
        ctx.drawImage(canvasProc, 0, 0);
        // 3. POSICIONAMENTO E CENTRALIZAÇÃO MATEMÁTICA DA LOGOMARCA
        if (imgLogo) {
            let areaUtil = configModelo.areaUtil;
            let larguraAlvo = areaUtil.largura * 0.75; // Ocupa no máximo 75% da área disponível
            let alturaAlvo = larguraAlvo * (imgLogo.height / imgLogo.width);

            // Ajusta o tamanho da estampa caso ela estoure os limites verticais da faca
            if (alturaAlvo > areaUtil.altura * 0.65) {
                alturaAlvo = areaUtil.altura * 0.65;
                larguraAlvo = alturaAlvo * (imgLogo.width / imgLogo.height);
            }

            // Calcula a posição XY exata para alinhar no centro do corpo da sacola
            let posX = areaUtil.x + (areaUtil.largura - larguraAlvo) / 2;
            let posY = areaUtil.y + (areaUtil.altura - alturaAlvo) / 2;

            ctx.save();
            ctx.globalAlpha = 0.98; // Simula a fixação física da tinta sobre o substrato
            ctx.drawImage(imgLogo, posX, posY, larguraAlvo, alturaAlvo);
            ctx.restore();
        }

        // Adiciona as especificações de cores na imagem final gerada
        ctx.fillStyle = "#475569";
        ctx.font = "bold 11px Arial";
        ctx.textAlign = "right";
        let textoEspecificacao = numCores === 'cromia' ? "GRAVAÇÃO: CROMIA ( PAPEL )" : `GRAVAÇÃO: ${numCores} COR(ES) SEGUINDO O PADRÃO DA LOGO`;
        ctx.fillText(textoEspecificacao, 580, 580);

        // Habilita e configura o botão de download em PNG nativo de alta qualidade
        const btnBaixar = document.getElementById('btnBaixarImage');
        btnBaixar.href = canvas.toDataURL("image/png");
        btnBaixar.style.display = 'inline-block';

    } catch (error) {
        console.error(error);
        alert("Erro ao processar as texturas. Certifique-se de que os nomes dos arquivos no servidor correspondem exatamente a 'sacola_pe_sombras.png' e 'sacola_deitada_sombras.png'.");
    }
}
</script>
</body>
</html>
