<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mockup Premium - Comvil Brindes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f3f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { display: flex; width: 100%; max-width: 1150px; gap: 30px; align-items: center; }
        .form-container { background-color: #ffffff; padding: 30px 25px; border-radius: 12px; width: 42%; min-width: 350px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); max-height: 95vh; overflow-y: auto; }
        h2 { color: #003366; font-size: 20px; font-weight: 700; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #eaeaea; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 600; color: #555555; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border: 1px solid #cccccc; border-radius: 6px; background-color: #ffffff; color: #333333; font-size: 14px; outline: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23333333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; background-size: 14px; }
        .papel-triplo-wrapper { display: flex; gap: 10px; align-items: center; width: 100%; }
        .picker-container { display: flex; flex-direction: column; width: 33.33%; }
        .picker-label { font-size: 9px; font-weight: 700; color: #777777; text-transform: uppercase; margin-bottom: 4px; text-align: center; }
        input[type="color"] { -webkit-appearance: none; border: 1px solid #cccccc; width: 100%; height: 42px; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }
        .btn-kraft { width: 33.33%; height: 42px; background-color: #c2a67a; color: #ffffff; border: none; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; align-self: flex-end; }
        .btn-kraft:hover { background-color: #b09468; }
        .btn-kraft.active { border: 2px solid #003366; background-color: #9e8257; }
        .cordao-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; background-color: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .cordao-box { aspect-ratio: 1 / 1; border-radius: 4px; cursor: pointer; border: 2px solid #cbd5e1; transition: all 0.1s ease-in-out; }
        .cordao-box:hover { transform: scale(1.1); border-color: #64748b; }
        .cordao-box.active { border-color: #003366; box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.15); }
        input[type="range"] { width: 100%; height: 6px; background: #e2e8f0; border-radius: 4px; outline: none; accent-color: #003366; cursor: pointer; }
        .file-input-wrapper { position: relative; display: flex; align-items: center; border: 1px solid #cccccc; border-radius: 6px; padding: 6px; background-color: #ffffff; overflow: hidden; }
        .file-input-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .btn-file { background-color: #efefef; border: 1px solid #dddddd; padding: 6px 12px; border-radius: 4px; font-size: 13px; pointer-events: none; }
        .file-text { font-size: 13px; color: #666666; margin-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-action { width: 100%; border: none; padding: 13px; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; margin-top: 12px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-generate { background-color: #28a745; color: #ffffff; }
        .btn-generate:hover { background-color: #218838; }
        .btn-download { background-color: #003366; color: #ffffff; }
        .btn-download:hover { background-color: #002244; }
        .btn-download:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .preview-container { flex-grow: 1; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 450px; }
        .preview-box { width: 100%; display: flex; justify-content: center; align-items: center; background: #e8e8e8; border-radius: 16px; padding: 20px; position: relative; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.02); border: 1px solid rgba(226, 232, 240, 0.8); touch-action: none; }
        canvas { max-width: 100%; height: auto !important; object-fit: contain; display: block; border-radius: 8px; }
        .hint-text { font-size: 11px; color: #888888; margin-top: 15px; font-weight: 500; text-align: center; }
        @media (max-width: 820px) { .container { flex-direction: column; gap: 20px; } .form-container { width: 100%; max-height: none; } .preview-container { width: 100%; min-height: auto; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>Mockup de Sacola</h2>
            <form id="mockupForm">
                <div class="form-group"><label for="modelo">Variação *</label><select id="modelo"><option value="vertical">Vertical</option><option value="horizontal">Horizontal</option></select></div>
                <div class="form-group">
                    <label>Configuração da Cor de Papel *</label>
                    <div class="papel-triplo-wrapper">
                        <div class="picker-container"><span class="picker-label">Frente</span><input type="color" id="cor-frente" value="#ffffff"></div>
                        <div class="picker-container"><span class="picker-label">Lateral</span><input type="color" id="cor-lateral" value="#ffffff"></div>
                        <button type="button" id="btnKraft" class="btn-kraft">Kraft</button>
                    </div>
                </div>
                <div class="form-group"><label>Cordão *</label><div class="cordao-grid" id="cordaoGrid"></div></div>
                <div class="form-group">
                    <label>Logotipo do Cliente (PNG Transparente) *</label>
                    <div class="file-input-wrapper"><button type="button" class="btn-file">Escolher ficheiro</button><span id="file-text" class="file-text">Nenhum ficheiro selecionado</span><input type="file" id="logo" accept="image/png"></div>
                </div>
                <div class="form-group"><label for="logo-zoom">Tamanho do Logotipo (Zoom)</label><input type="range" id="logo-zoom" min="10" max="70" value="35"></div>
                <div class="form-group"><label for="logo-giro">Giro do Logotipo (Rotação)</label><input type="range" id="logo-giro" min="-15" max="15" value="0" step="0.5"></div>
                <button type="button" id="btnGenerateJPEG" class="btn-action btn-generate">⚙️ Gerar Mockup (JPEG)</button>
                <button type="submit" id="btnDownloadLayout" class="btn-action btn-download" disabled>💾 Descarregar Layout</button>
            </form>
        </div>
        <div class="preview-container"><div class="preview-box"><canvas id="mockupCanvas"></canvas></div><span class="hint-text">💡 Arraste na tela para mover / Use as barras para zoom e giro</span></div>
    </div>
    <script>
        const canvas = document.getElementById('mockupCanvas');
        const ctx = canvas.getContext('2d');

        const elModelo = document.getElementById('modelo');
        const elCorFrente = document.getElementById('cor-frente');
        const elCorLateral = document.getElementById('cor-lateral');
        const elBtnKraft = document.getElementById('btnKraft');
        const elInputLogo = document.getElementById('logo');
        const elFileText = document.getElementById('file-text');
        const elCordaoGrid = document.getElementById('cordaoGrid');
        
        const elLogoZoom = document.getElementById('logo-zoom');
        const elLogoGiro = document.getElementById('logo-giro');
        const elForm = document.getElementById('mockupForm');
        const btnGenerateJPEG = document.getElementById('btnGenerateJPEG');
        const btnDownloadLayout = document.getElementById('btnDownloadLayout');

        let imgBase = new Image(), imgFrente = new Image(), imgLateral = new Image(), imgCordao = new Image(), imgLogo = new Image(), imgEmpresa = new Image();
        let modoKraftAtivo = false, logoCarregada = false, logoEmpresaPronta = false, mockupGeradoComRodape = false;
        let corCordaoSelecionada = "#ffffff", logoX = 0, logoY = 0, arrastandoLogo = false, offsetMouseX = 0, offsetMouseY = 0, logoAtualWidth = 0, logoAtualHeight = 0;

        const mostruarioCordao = [
            { nome: "Branco", hex: "#ffffff" }, { nome: "Preto", hex: "#000000" }, { nome: "Cinza Claro", hex: "#8c8c8c" }, 
            { nome: "Azul Caneta", hex: "#0b2bc6" }, { nome: "Azul Claro", hex: "#7ec8e3" }, { nome: "Verde Escuro", hex: "#006129" }, 
            { nome: "Verde Pistache", hex: "#74b74b" }, { nome: "Vermelho", hex: "#e5121c" }, { nome: "Rosa BB", hex: "#ffa3cc" }, 
            { nome: "Pink", hex: "#cb1661" }, { nome: "Laranja", hex: "#ff5100" }, { nome: "Amarelo Ouro", hex: "#ffc800" }, 
            { nome: "Amarelo Limão", hex: "#fff700" }, { nome: "Roxo", hex: "#520188" }, { nome: "Violeta Claro", hex: "#8700ff" }, 
            { nome: "Vinho Escuro", hex: "#510224" }, { nome: "Marrom Café", hex: "#86725e" }, { nome: "Bege Kraft", hex: "#cba277" }
        ];

        imgEmpresa.crossOrigin = "anonymous";
        imgEmpresa.onload = () => logoEmpresaPronta = true;
        imgEmpresa.src = 'logo-empresa.png';

        function renderizarGradeCordoes() {
            elCordaoGrid.innerHTML = "";
            mostruarioCordao.forEach(cor => {
                const box = document.createElement('div');
                box.className = `cordao-box ${cor.hex === corCordaoSelecionada ? 'active' : ''}`;
                box.style.backgroundColor = cor.hex;
                box.title = cor.nome;
                box.addEventListener('click', () => {
                    document.querySelectorAll('.cordao-box').forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                    corCordaoSelecionada = cor.hex;
                    atualizarPreview();
                });
                elCordaoGrid.appendChild(box);
            });
        }

        function criarCamadaColorida(imgMascara, corHex) {
            const buffer = document.createElement('canvas');
            buffer.width = canvas.width; buffer.height = canvas.height;
            const bCtx = buffer.getContext('2d');
            if (imgMascara.complete && imgMascara.naturalWidth > 0) {
                bCtx.drawImage(imgMascara, 0, 0);
                bCtx.globalCompositeOperation = 'source-in';
                bCtx.fillStyle = corHex;
                bCtx.fillRect(0, 0, canvas.width, canvas.height);
            }
            return buffer;
        }

        function resetarPosicaoLogoPadrao() {
            if (!imgBase.naturalWidth) return;
            logoX = imgBase.naturalWidth * (elModelo.value === 'horizontal' ? 0.48 : 0.50);
            logoY = imgBase.naturalHeight * (elModelo.value === 'horizontal' ? 0.54 : 0.53);
        }

        function carregarArquivosDoServidor() {
            const sentido = elModelo.value;
            let carregadas = 0;
            const verificarPronto = () => { if (++carregadas === 4) { resetarPosicaoLogoPadrao(); atualizarPreview(); } };
            [imgBase, imgFrente, imgLateral, imgCordao].forEach(img => { img.crossOrigin = "anonymous"; img.onload = verificarPronto; });
            imgBase.src = `sacola_${sentido}_base.png?v=${Date.now()}`;
            imgFrente.src = `sacola_${sentido}_frente.png?v=${Date.now()}`;
            imgLateral.src = `sacola_${sentido}_lateral.png?v=${Date.now()}`;
            imgCordao.src = `sacola_${sentido}_cordao.png?v=${Date.now()}`;
        }

        function desenharLogoPerspectiva(ctx, img, x, y, largura, altura, escalaDireita) {
            const fatias = 100;
            const largFatia = largura / fatias;
            for (let i = 0; i < fatias; i++) {
                const progresso = i / fatias;
                const altFatia = altura * (1 - (progresso * (1 - escalaDireita)));
                ctx.drawImage(img, (i * (img.naturalWidth / fatias)), 0, (img.naturalWidth / fatias), img.naturalHeight, x - largura / 2 + (i * largFatia), y - altFatia / 2, largFatia + 0.5, altFatia);
            }
        }

        function atualizarPreview() { mockupGeradoComRodape = false; btnDownloadLayout.disabled = true; processarETingirMockup(false); }
        function processarETingirMockup(incluirRodape = false) {
            if (!imgBase.complete || imgBase.naturalWidth === 0) return;
            canvas.width = imgBase.naturalWidth;
            canvas.height = incluirRodape ? imgBase.naturalHeight + 110 : imgBase.naturalHeight;

            ctx.fillStyle = "#e8e8e8"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.shadowColor = "rgba(0, 0, 0, 0.38)"; ctx.shadowBlur = canvas.width * 0.04;
            ctx.shadowOffsetX = canvas.width * 0.015; ctx.shadowOffsetY = canvas.height * 0.025;
            ctx.drawImage(imgBase, 0, 0);
            ctx.restore();

            const corF = modoKraftAtivo ? "#c2a67a" : elCorFrente.value;
            const corL = modoKraftAtivo ? "#c2a67a" : elCorLateral.value;
            ctx.drawImage(criarCamadaColorida(imgFrente, corF), 0, 0);
            ctx.drawImage(criarCamadaColorida(imgLateral, corL), 0, 0);

            if (logoCarregada && imgLogo.complete && imgLogo.naturalWidth > 0) {
                ctx.save();
                ctx.drawImage(imgFrente, 0, 0);
                ctx.globalCompositeOperation = 'source-in';
                
                logoAtualWidth = canvas.width * (elLogoZoom.value / 100);
                logoAtualHeight = (imgLogo.naturalHeight / imgLogo.naturalWidth) * logoAtualWidth;
                
                ctx.translate(logoX, logoY);
                ctx.rotate((parseFloat(elLogoGiro.value) * Math.PI) / 180);
                ctx.transform(1, 0, elModelo.value === 'horizontal' ? -0.200 : -0.080, 1, 0, 0);
                
                desenharLogoPerspectiva(ctx, imgLogo, 0, 0, logoAtualWidth, logoAtualHeight, elModelo.value === 'horizontal' ? 0.82 : 0.90);
                ctx.restore();
            }

            ctx.drawImage(criarCamadaColorida(imgCordao, corCordaoSelecionada), 0, 0);
            ctx.save(); ctx.globalCompositeOperation = 'multiply'; ctx.drawImage(imgBase, 0, 0); ctx.restore();

            if (incluirRodape) {
                ctx.save();
                ctx.fillStyle = "#e8e8e8"; ctx.fillRect(0, imgBase.naturalHeight, canvas.width, 110);
                ctx.strokeStyle = "rgba(0, 0, 0, 0.05)"; ctx.lineWidth = 1; ctx.beginPath();
                ctx.moveTo(30, imgBase.naturalHeight); ctx.lineTo(canvas.width - 30, imgBase.naturalHeight); ctx.stroke();

                ctx.textAlign = "center";
                let cX = canvas.width / 2, tY = imgBase.naturalHeight;

                if (logoEmpresaPronta && imgEmpresa.naturalWidth > 0) {
                    let lCalc = (imgEmpresa.naturalWidth / imgEmpresa.naturalHeight) * 26;
                    ctx.drawImage(imgEmpresa, cX - (lCalc / 2), tY + 15, lCalc, 26);
                }
                ctx.fillStyle = "#1e293b"; ctx.font = "bold 13px sans-serif"; ctx.fillText("COMVIL BRINDES", cX, tY + 56);
                ctx.font = "10px sans-serif"; ctx.fillStyle = "#475569";
                ctx.fillText("CNPJ: 36.206.286/0001-03  |  ✉ comvil@comvil.com.br", cX, tY + 74);
                ctx.fillText("☎ Fixo: 11 3461-0813  |  📱 WhatsApp: 11 97024-3064", cX, tY + 90);
                ctx.restore();
            }
        }

        elInputLogo.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files && files[0]) {
                elFileText.textContent = files[0].name;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    logoCarregada = false; imgLogo = new Image();
                    imgLogo.onload = () => { logoCarregada = true; resetarPosicaoLogoPadrao(); atualizarPreview(); };
                    imgLogo.src = evt.target.result;
                };
                reader.readAsDataURL(files[0]);
            }
        });

        function obterCoordenadasPointer(e) {
            const r = canvas.getBoundingClientRect();
            return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (!logoCarregada) return;
            canvas.setPointerCapture(e.pointerId);
            const m = obterCoordenadasPointer(e);
            if (m.x >= logoX - logoAtualWidth/2 && m.x <= logoX + logoAtualWidth/2 && m.y >= logoY - logoAtualHeight/2 && m.y <= logoY + logoAtualHeight/2) {
                arrastandoLogo = true; offsetMouseX = m.x - logoX; offsetMouseY = m.y - logoY; canvas.style.cursor = "grabbing";
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!logoCarregada) return;
            const m = obterCoordenadasPointer(e);
            if (arrastandoLogo) { logoX = m.x - offsetMouseX; logoY = m.y - offsetMouseY; processarETingirMockup(false); }
            else { canvas.style.cursor = (m.x >= logoX - logoAtualWidth/2 && m.x <= logoX + logoAtualWidth/2 && m.y >= logoY - logoAtualHeight/2 && m.y <= logoY + logoAtualHeight/2) ? "pointer" : "default"; }
        });

        canvas.addEventListener('pointerup', (e) => { if (arrastandoLogo) { canvas.releasePointerCapture(e.pointerId); arrastandoLogo = false; canvas.style.cursor = "default"; atualizarPreview(); } });

        btnGenerateJPEG.addEventListener('click', () => { processarETingirMockup(true); mockupGeradoComRodape = true; btnDownloadLayout.disabled = false; });
        elBtnKraft.addEventListener('click', () => { modoKraftAtivo = !modoKraftAtivo; elBtnKraft.classList.toggle('active', modoKraftAtivo); atualizarPreview(); });
        elCorFrente.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); atualizarPreview(); });
        elCorLateral.addEventListener('input', () => { modoKraftAtivo = false; elBtnKraft.classList.remove('active'); atualizarPreview(); });
        elLogoZoom.addEventListener('input', atualizarPreview); elLogoGiro.addEventListener('input', atualizarPreview); elModelo.addEventListener('change', carregarArquivosDoServidor);

        elForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!mockupGeradoComRodape) return;
            const link = document.createElement('a');
            link.download = `proposta-comvil-${elModelo.value}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 1.0);
            link.click();
        });

        window.addEventListener('DOMContentLoaded', () => { renderizarGradeCordoes(); carregarArquivosDoServidor(); });
    </script>
</body>
</html>
